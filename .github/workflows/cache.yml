name: Cache Workflow

on: workflow_dispatch

jobs:
  cache-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cache dependencies
        id: cache-step
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: cache-7ea7af1

      - name: prime-cache-7ea7af1
        run: echo "Cache Hit? -> ${{ steps.cache-step.outputs.cache-hit }}"
